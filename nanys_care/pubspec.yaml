name: nanys_care
description: "Nanys Care - Plataforma para conectar familias con cuidadores de confianza."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.2          # Manejo de estado (RF1..RF10)
  go_router: ^14.2.0        # Navegación declarativa
  path_provider: ^2.1.3     # Acceso al directorio local de la app
  intl: ^0.19.0             # Formato de fechas en español
  image_picker: ^1.1.2      # Selección de foto de perfil (RF3)
  crypto: ^3.0.3            # Hash SHA-256 para contraseñas (RNF1)
  uuid: ^4.4.0              # IDs únicos para registros locales
  table_calendar: ^3.1.2    # Calendario para agendar citas (RF8)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/
